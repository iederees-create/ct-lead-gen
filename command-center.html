    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2ff;
            --accent-rose: #ff4d94;
            --accent-amber: #ffaa00;
            --accent-green: #00ff88;
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --glass: rgba(15, 23, 42, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-cyan) transparent;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 77, 148, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
        }

        .header-left h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .view-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .toggle-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--accent-cyan);
            color: #000;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            background: var(--glass);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent-cyan);
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 10px 20px;
            border-radius: 10px;
            color: var(--text-dim);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: rgba(0, 242, 255, 0.2);
            color: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        .leads-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .lead-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .lead-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .lead-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .lead-card[data-industry="Solar"]::before {
            background: var(--accent-cyan);
        }

        .lead-card[data-industry="Wellness"]::before {
            background: var(--accent-rose);
        }

        .lead-card[data-industry="Maintenance"]::before {
            background: var(--accent-amber);
        }

        .lead-card[data-industry="Vector"]::before {
            background: var(--accent-green);
        }

        .industry-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 800;
            margin-bottom: 12px;
            display: inline-block;
        }

        .lead-card[data-industry="Solar"] .industry-tag {
            color: var(--accent-cyan);
        }

        .lead-card[data-industry="Wellness"] .industry-tag {
            color: var(--accent-rose);
        }

        .lead-card[data-industry="Maintenance"] .industry-tag {
            color: var(--accent-amber);
        }

        .lead-card[data-industry="Vector"] .industry-tag {
            color: var(--accent-green);
            font-family: 'JetBrains Mono';
        }

        .business-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .rating {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-rose {
            background: var(--accent-rose);
            color: #fff;
        }

        .btn {
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: white;
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-primary {
            background: var(--accent-cyan);
            color: #000;
        }

        .btn-green {
            background: var(--accent-green);
            color: #000;
        }

        .btn-primary:hover,
        .btn-green:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .stats-bar {
            max-width: 1200px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .stat-item b {
            color: #fff;
        }

        #vectorControls {
            display: none;
        }

        @media (max-width: 600px) {
            .leads-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

        const leadsGrid = document.getElementById('leadsGrid');
        const searchInput = document.getElementById('searchInput');
        const vectorSearch = document.getElementById('vectorSearch');
        const filterBtns = document.querySelectorAll('#localControls .filter-btn');
        const vectorFilterBtns = document.querySelectorAll('#vectorControls .filter-btn');
        const statsBar = document.getElementById('statsBar');
        const btnLocal = document.getElementById('btnLocal');
        const btnVector = document.getElementById('btnVector');
        const localControls = document.getElementById('localControls');
        const vectorControls = document.getElementById('vectorControls');

        let activeFilter = 'All';
        let activeVectorFilter = 'All';
        let currentMode = 'local';

        function renderLeads() {
            if (currentMode === 'local') {
                renderLocalLeads();
            } else {
                renderVectorBlueprints();
            }
        }

        function renderLocalLeads() {
            const searchTerm = searchInput.value.toLowerCase();
            const filtered = leadsData.filter(lead => {
                const matchesSearch = lead.name.toLowerCase().includes(searchTerm) || lead.location.toLowerCase().includes(searchTerm);
                const matchesFilter = activeFilter === 'All' || lead.industry === activeFilter;
                return matchesSearch && matchesFilter;
            });

            leadsGrid.innerHTML = filtered.map(lead => `
                <div class="lead-card" data-industry="${lead.industry}">
                    <span class="industry-tag">${lead.industry}</span>
                    <h2 class="business-name">${lead.name}</h2>
                    <div class="location-info">
                        <span>📍 ${lead.location}</span>
                        <span class="rating">⭐ ${lead.rating}</span>
                    </div>
                    <div class="actions">
                        <a href="${lead.liveUrl}" target="_blank" class="btn btn-ghost">View Live Demo</a>
                        <div class="action-row">
                            <a href="${lead.waLink}" target="_blank" class="btn btn-primary" style="font-size: 0.7rem;">WhatsApp</a>
                            <a href="mailto:?subject=${encodeURIComponent(lead.emailSubj)}&body=${encodeURIComponent(lead.emailBody)}" class="btn btn-rose" style="font-size: 0.7rem;">Email Pitch</a>
                        </div>
                    </div>
                </div>
            `).join('');

            updateStats(filtered.length);
        }

        function renderVectorBlueprints() {
            const searchTerm = vectorSearch.value.toLowerCase();
            const filtered = vectorData.filter(node => {
                const matchesSearch = node.name.toLowerCase().includes(searchTerm) || node.location.toLowerCase().includes(searchTerm);
                const matchesFilter = activeVectorFilter === 'All' || node.category === activeVectorFilter;
                return matchesSearch && matchesFilter;
            });

            leadsGrid.innerHTML = filtered.map(node => `
                <div class="lead-card" data-industry="Vector">
                    <span class="industry-tag">VECTOR // ${node.category}</span>
                    <h2 class="business-name">${node.name}</h2>
                    <div class="location-info">
                        <span style="color:var(--accent-green)">⚡ ${node.location}</span>
                        <span class="rating" style="border-color:var(--accent-green);color:var(--accent-green)">${node.rating}</span>
                    </div>
                    <p style="font-size:0.85rem; color:var(--text-dim); margin-bottom:20px; line-height:1.4">${node.description}</p>
                    <div class="actions">
                        <a href="${node.liveUrl}" target="_blank" class="btn btn-ghost">View Live Demo</a>
                        <a href="https://www.etsy.com/shop/iedereescreate" target="_blank" class="btn btn-green">Etsy Listing</a>
                    </div>
                </div>
            `).join('');

            updateStats(filtered.length);
        }

        function updateStats(count) {
            if (currentMode === 'local') {
                statsBar.innerHTML = `
                    <div class="stat-item">Local Leads: <b>${count}</b></div>
                    <div class="stat-item">Solar: <b>${leadsData.filter(l => l.industry === 'Solar').length}</b></div>
                    <div class="stat-item">Wellness: <b>${leadsData.filter(l => l.industry === 'Wellness').length}</b></div>
                `;
            } else {
                statsBar.innerHTML = `
                    <div class="stat-item">Vector Blueprints: <b>${count}</b></div>
                    <div class="stat-item">SaaS Units: <b>${vectorData.filter(v => v.category === 'SaaS').length}</b></div>
                    <div class="stat-item">Service Units: <b>${vectorData.filter(v => v.category === 'Service').length}</b></div>
                `;
            }
        }

        searchInput.addEventListener('input', renderLeads);
        vectorSearch.addEventListener('input', renderLeads);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.industry;
                renderLeads();
            });
        });

        vectorFilterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                vectorFilterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeVectorFilter = btn.dataset.category;
                renderLeads();
            });
        });

        btnLocal.addEventListener('click', () => {
            btnLocal.classList.add('active');
            btnVector.classList.remove('active');
            localControls.style.display = 'flex';
            vectorControls.style.display = 'none';
            currentMode = 'local';
            renderLeads();
        });

        btnVector.addEventListener('click', () => {
            btnVector.classList.add('active');
            btnLocal.classList.remove('active');
            localControls.style.display = 'none';
            vectorControls.style.display = 'flex';
            currentMode = 'vector';
            renderLeads();
        });

        // Initial render
        renderLeads();
    </script>
